databases:
  - name: spa-db
    plan: starter
    postgresMajorVersion: "16"

services:
  - type: web
    name: spa-reservations
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: SEED_ADMIN_USERNAME
        value: admin
      - key: SEED_ADMIN_PASSWORD
        value: changeme123
